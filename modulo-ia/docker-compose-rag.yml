# ─────────────────────────────────────────────────────────────────────────────
# ADIÇÕES AO SEU docker-compose.yml EXISTENTE
#
# Copie os serviços abaixo para dentro do bloco "services:" do seu
# docker-compose.yml principal. Não substitua o arquivo inteiro.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────
  # BANCO VETORIAL (ChromaDB)
  # Armazena os embeddings dos jogos para busca semântica
  # ───────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: game-radar-chromadb
    ports:
      - "8005:8000"          # Acesso local para inspeção/debug
    volumes:
      - chroma_data:/chroma/chroma   # Persiste os dados entre reinicializações
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - game-radar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ───────────────────────────────────────────
  # MÓDULO DE IA + RAG (Orquestrador LangChain)
  # Este é o main.py atualizado com a integração RAG real
  # ───────────────────────────────────────────
  ia-service:
    build:
      context: ./ia          # Pasta onde ficam: main.py, rag.py, Dockerfile, requirements.txt
      dockerfile: Dockerfile
    container_name: game-radar-ia
    ports:
      - "8002:8002"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000       # Porta INTERNA do container (não a mapeada)
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - game-radar-network
    volumes:
      - ./ia:/app              # Hot-reload durante desenvolvimento


  # ───────────────────────────────────────────
  # INGESTÃO RAG (job único — roda e termina)
  # Execute manualmente para popular o ChromaDB:
  #   docker compose run --rm rag-ingest
  # ───────────────────────────────────────────
  rag-ingest:
    build:
      context: ./ia
      dockerfile: Dockerfile
    container_name: game-radar-ingest
    command: python ingest.py
    environment:
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - game-radar-network
    profiles:
      - ingest    # Não sobe automaticamente; apenas quando chamado explicitamente


# ─────────────────────────────────────────────────────────────────────────────
# VOLUMES (adicione ao bloco "volumes:" existente no seu compose)
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  chroma_data:


# ─────────────────────────────────────────────────────────────────────────────
# REDE (adicione ao bloco "networks:" existente, ou crie se não existir)
# ─────────────────────────────────────────────────────────────────────────────
networks:
  game-radar-network:
    driver: bridge
